# Cloudflare Workers Configuration for Next.js Frontend with OpenNext
name = "contact-center-frontend"
main = ".open-next/worker.js"
compatibility_date = "2025-03-25"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"

# Routes - serve the frontend on the main domain
# Note: The backend Worker with pattern "contactcenter.telnyx.solutions/api/*" will take precedence
# due to being more specific, so we don't need to explicitly exclude it here
[[routes]]
pattern = "contactcenter.telnyx.solutions/*"
zone_name = "telnyx.solutions"

# D1 Database binding (same as backend)
[[d1_databases]]
binding = "DB"
database_name = "contact-center-db"
database_id = "8bb564a7-f70a-449c-b2da-492bebc08e9a"

# Environment variables for the frontend
[vars]
NEXT_PUBLIC_API_URL = "https://contactcenter.telnyx.solutions/api"
NEXT_PUBLIC_WS_URL = "wss://contactcenter.telnyx.solutions"
NODE_ENV = "production"

# Secrets (set using: wrangler secret put SECRET_NAME)
# These would be useful if your Next.js app needs server-side authentication:
# - JWT_SECRET (for validating auth tokens in middleware)
# - SESSION_SECRET (for session management)
# - TELNYX_API_KEY (if frontend needs to make direct Telnyx API calls)
